{% extends 'librarian/base.html' %}

{% block title %}Make a Payment{% endblock %}

{% block body %}
{% include 'user/usertopbar.html' %}
<div class="container mt-5">
  <h1>Make a Payment</h1>
  <form method="POST" action="{% url 'make_payment' %}">
    {% csrf_token %}
    <div class="mb-3">
      <label for="payment_type" class="form-label">Payment Type</label>
      <input type="text" id="payment_type" name="payment_type" value="{{ payment_type }}" class="form-control" readonly>
    </div>
    <div class="mb-3">
      <label for="amount" class="form-label">Amount</label>
      <input type="text" id="amount" name="amount" value="₹{{ amount }}" class="form-control" readonly>
    </div>
    <div class="mb-3">
      <label for="card_number" class="form-label">Card Number</label>
      <input type="text" id="card_number" name="card_number" class="form-control" placeholder="Enter 16-digit card number" required>
    </div>
    <div class="mb-3">
      <label for="card_expiry" class="form-label">Expiry Date (MM/YY)</label>
      <input type="text" id="card_expiry" name="card_expiry" class="form-control" placeholder="MM/YY" required>
    </div>
    <div class="mb-3">
      <label for="card_cvv" class="form-label">CVV</label>
      <input type="text" id="card_cvv" name="card_cvv" class="form-control" placeholder="Enter 3-digit CVV" required>
    </div>
    <button type="submit" class="btn btn-primary">Pay Now</button>
  </form>
</div>
{% endblock %}
