<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
    <div>
        <h3>Register</h3>
        <form action="" method="post" novalidate>
            {% csrf_token %}
            <p>UserName: {{regis_form.username}}</p>
            <p>Password: {{regis_form.password}}</p>
            <p>Re-enter Password: {{regis_form.password2}}</p>
            <p>FirstName: {{regis_form.first_name}}</p>
            <p>LastName: {{regis_form.last_name}}</p>
            <p>Email: {{regis_form.email}}</p>
            <input type="submit" value="submit" class="btn btn-success">
        </form>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</html>
