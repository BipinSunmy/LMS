{% extends 'librarian/base.html' %}

{% block body %}
<div class="container">
    <h3>Edit Book Details</h3>

        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}
