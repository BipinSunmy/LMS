<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User by Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h3>Edit User</h3>
        
        <!-- Dropdown for selecting a user -->
        <form method="post" action="">
            {% csrf_token %}
            <div class="mb-3">
                <h5>Select a User</h5>
                {{ select_form.as_p }}
                <button type="submit" name="select_user" class="btn btn-primary">Select User</button>
            </div>
        </form>

        <!-- Form for editing the selected user -->
        {% if selected_user %}
            <h5>Edit Details for {{ selected_user.username }}</h5>
            <form method="post" action="">
                {% csrf_token %}
                <input type="hidden" name="user_id" value="{{ selected_user.id }}">
                {{ edit_form.as_p }}
                <button type="submit" name="edit_user" class="btn btn-success">Save Changes</button>
            </form>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
