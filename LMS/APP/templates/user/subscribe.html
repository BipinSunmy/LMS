<!-- user/subscribe.html -->
<h1>Choose a Subscription</h1>
<form method="POST">
    {% csrf_token %}
    <button type="submit" name="subscription_type" value="silver" class="btn btn-primary">Silver (1 Month)</button>
    <button type="submit" name="subscription_type" value="gold" class="btn btn-primary">Gold (3 Months)</button>
    <button type="submit" name="subscription_type" value="platinum" class="btn btn-primary">Platinum (1 Year)</button>
</form>
