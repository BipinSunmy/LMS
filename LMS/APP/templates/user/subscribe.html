{% extends "librarian/base.html" %}

{% block style %}
<style>
    .hover-box:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        background-color: #007bff;
        color: white;
    }
    .hover-box {
        transition: all 0.3s ease-in-out;
        border: 1px solid #ddd;
        border-radius: 10px;
    }
    .full-height {
        height: 15cm;
        padding-top: 50px;
    }
    .nav {
        background-color: black;
    }
</style>
{% endblock %}

{% block body %}
{% include 'user/usertopbar.html' %}

<div class="container mt-5">
    <h1 class="text-center mb-5">Choose a Subscription Plan</h1>
    <div class="row g-4 full-height">
        <!-- Silver Subscription -->
        <div class="col-md-4 d-flex justify-content-center align-items-center">
            <a method = "post" href="{% url 'sub_payment' %}?amount=29&payment_type=silver" class="text-decoration-none w-100 h-100">
                <div class="card hover-box h-100 text-center">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center">
                        <h2 class="card-title">Silver</h2>
                        <p><b>1 Month (Rs.29)</b></p>
                    </div>
                </div>
            </a>
        </div>

        <!-- Gold Subscription -->
        <div class="col-md-4 d-flex justify-content-center align-items-center">
            <a method = "post" href="{% url 'sub_payment' %}?amount=80&payment_type=gold" class="text-decoration-none w-100 h-100">
                <div class="card hover-box h-100 text-center">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center">
                        <h2 class="card-title">Gold</h2>
                        <p><b>3 Months (Rs.80)</b></p>
                    </div>
                </div>
            </a>
        </div>

        <!-- Platinum Subscription -->
        <div class="col-md-4 d-flex justify-content-center align-items-center">
            <a method = "post" href="{% url 'sub_payment' %}?amount=300&payment_type=platinum" class="text-decoration-none w-100 h-100">
                <div class="card hover-box h-100 text-center">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center">
                        <h2 class="card-title">Platinum</h2>
                        <p><b>1 Year (Rs.300)</b></p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
