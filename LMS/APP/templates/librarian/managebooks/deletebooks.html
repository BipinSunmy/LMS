<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h3>Select a Book to Delete</h3>
        <form action="" method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="book_id" class="form-label">Choose a Book</label>
                <select class="form-select" name="book_id" id="book_id" required>
                    <option value="" disabled selected>Select a Book</option>
                    {% for book in books %}
                        <option value="{{ book.id }}">{{ book.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="confirm" class="form-label">Are you sure?</label>
                <select class="form-select" name="confirm" id="confirm" required>
                    <option value="no" selected>No</option>
                    <option value="yes">Yes</option>
                </select>
            </div>
            <button type="submit" class="btn btn-danger">Delete</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
